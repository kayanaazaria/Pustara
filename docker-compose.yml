services:
  # PUSTARA Frontend Service
  pustara-frontend:
    build:
      context: ../pustara-fe
      dockerfile: ./Dockerfile
    container_name: pustara-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - ../pustara-fe:/app:delegated
      - /app/node_modules
      - /app/.next
    depends_on:
      - pustara-backend
    restart: always

  # PUSTARA Backend Service
  pustara-backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: pustara-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEON_CLOUD_MODE=${NEON_CLOUD_MODE}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - PORT=${PORT}
    volumes:
      # Mount only source code, preserve node_modules from build
      - ./backend:/app:delegated
      # Keep node_modules from docker build
      - /app/node_modules
    command: npm run dev
    restart: always